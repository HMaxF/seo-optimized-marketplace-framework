<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tetris game</title>
    <style>
html { font-size:16px; font-family: Helvetica, Arial, sans-serif; height:100%; }
*{box-sizing:border-box}
body{
  margin:0; background:#000; color:#ddd; height:100vh; width:100vw; overflow:hidden; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; display:flex; flex-direction:column;
}
header{padding:8px 0; text-align:center; font-weight:700; flex-shrink:0}
main{
  flex:1; width:100%; display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.panel{display:flex; flex-direction:column; align-items:center; justify-content:flex-start; width:100%; height:100%}
.left,.center,.right{flex:1; background:transparent}

.play-area{display:grid; grid-template-columns:repeat(10,1fr); grid-template-rows:repeat(20,1fr); gap:2px; background:#111; padding:6px; border-radius:6px; width:auto; height:auto;}
.cell{background:#000; border: 3px solid #333; border-radius:2px; width:var(--cell-size); height:var(--cell-size);}
.cell.filled{background:#666}
.cell.i{background:#00f0f0}
.cell.j{background:#0000f0}
.cell.l{background:#f0a000}
.cell.o{background:#f0f000}
.cell.s{background:#00f000}
.cell.t{background:#a000f0}
.cell.z{background:#f00000}

.controls{display:flex; gap:6px; margin-top:8px; width:100%}
.touch-area{flex:1; background:#111; padding:8px; border-radius:6px; color:#bbb; text-align:center; user-select:none; font-size:14px}
.touch-area:active{background:#222}

.info{color:#bbb; min-width:120px; text-align:center; margin-top:8px; font-size:12px}

@media (max-width:600px){
  header{padding:6px 0; font-size:14px}
}

    </style>
  </head>
  <body>
    <header>Tetris game</header>
    <main id="main-area">
      <div class="panel center" style="align-items:center">
        <div class="play-area" id="playfield" aria-label="Tetris playfield"></div>
        <div class="controls">
          <div class="touch-area" id="touch-left-small">◀</div>
          <div class="touch-area" id="touch-center-small">⟳</div>
          <div class="touch-area" id="touch-right-small">▶</div>
        </div>
        <div class="info" id="info" style="margin-top:12px">
          <div>Next:</div>
          <div id="nextPreview" style="display:grid;grid-template-columns:repeat(4,20px);gap:2px;margin-top:6px"></div>
          <div style="margin-top:8px">Score: <span id="score">0</span></div>
        </div>
        <div id="gameOverModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; padding:40px; border-radius:12px; text-align:center; z-index:1000; border:2px solid #666">
          <div style="font-size:32px; margin-bottom:20px">GAME OVER</div>
          <button id="restartBtn" style="padding:12px 32px; font-size:18px; background:#00f0f0; color:#000; border:none; border-radius:6px; cursor:pointer">Restart</button>
        </div>
      </div>
    </main>

    <script>
    (function(){
      const cols = 10, rows = 20, size = cols*rows;
      const playfield = document.getElementById('playfield');
      const nextPreview = document.getElementById('nextPreview');
      const scoreEl = document.getElementById('score');
      let cells = [];
      
      // Calculate and apply cell size dynamically
      function updateCellSize(){
        const headerH = document.querySelector('header').offsetHeight;
        const availH = window.innerHeight - headerH - 120; // 120px for controls + info + gaps
        const availW = window.innerWidth * 0.9; // 90vw
        const cellSize = Math.floor(Math.min(availW / cols, availH / rows));
        document.documentElement.style.setProperty('--cell-size', cellSize + 'px');
      }
      
      function createGrid(){
        playfield.innerHTML=''; cells = [];
        for(let i=0;i<size;i++){ const div = document.createElement('div'); div.className='cell'; div.dataset.index=i; playfield.appendChild(div); cells.push(div); }
      }

      // Tetromino definitions (rotations as arrays of offsets)
      const TETROMINOES = {
        I: [[0,1,2,3],[0,cols,cols*2,cols*3]],
        J: [[1,11,20,21],[0,10,11,12],[0,1,10,20],[0,1,2,12]],
        L: [[0,10,20,21],[0,1,2,10],[0,1,11,21],[2,10,11,12]],
        O: [[0,1,cols,cols+1]],
        S: [[1,2,cols,cols+1],[0,cols,cols+1,cols*2+1]],
        Z: [[0,1,cols+1,cols+2],[1,cols,cols+1,cols*2]],
        T: [[1,10,11,12],[1,cols+1,cols,cols*2+1],[cols,cols+1,cols+2,cols*2+1],[1,cols-1,cols+1,cols*2+1]]
      };
      const pieceTypes = Object.keys(TETROMINOES);

      let current = null, currentPos = cols + 4, currentRot = 0, currentType='T';
      let nextType = randomType();
      let timer = null; let score = 0; let gameOver_flag = false;

      function randomType(){ return pieceTypes[Math.floor(Math.random()*pieceTypes.length)]; }

      function spawn(){ 
        currentType = nextType; 
        nextType = randomType(); 
        currentRot = 0; 
        currentPos = cols + 4;  // Spawn at row 1, center
        current = TETROMINOES[currentType][currentRot]; 
        if(!validPosition(currentPos,current)){ 
          gameOver_flag = true;
          clearInterval(timer); 
          document.getElementById('gameOverModal').style.display = 'block';
        } 
        renderNext(); 
      }

      function renderNext(){ nextPreview.innerHTML=''; nextPreview.textContent = nextType; }

      function draw(){ undraw(); current.forEach(offset=>{ const idx = currentPos + offset; if(cells[idx]) cells[idx].classList.add('filled', currentType.toLowerCase()); }); }
      function undraw(){ cells.forEach(c=>{ c.classList.remove('filled','i','j','l','o','s','t','z'); }); // redraw settled kept by 'locked' class
        // reapply locked from dataset
        cells.forEach((c,i)=>{ if(c.dataset.locked==='1'){ c.classList.add('filled', c.dataset.type); } });
      }

      function validPosition(pos, shape){ return shape.every(off=>{
        const idx = pos + off;
        const x = idx % cols; const y = Math.floor(idx/cols);
        if(x<0 || x>=cols || y<0 || y>=rows) return false;
        if(cells[idx] && cells[idx].dataset.locked==='1') return false;
        return true;
      }); }

      function moveDown(){ if(!current || gameOver_flag) return; const newPos = currentPos + cols; if(validPosition(newPos,current)){ currentPos=newPos; draw(); } else { // lock
          current.forEach(off=>{ const idx = currentPos+off; if(cells[idx]){ cells[idx].dataset.locked='1'; cells[idx].dataset.type = currentType.toLowerCase(); cells[idx].classList.add('filled', currentType.toLowerCase()); } }); clearLines(); spawn(); draw(); }
      }

      function moveLeft(){ if(gameOver_flag) return; const newPos = currentPos -1; if(validPosition(newPos,current) && !crossesBoundary(newPos,current,-1)){ currentPos=newPos; draw(); } }
      function moveRight(){ if(gameOver_flag) return; const newPos = currentPos +1; if(validPosition(newPos,current) && !crossesBoundary(newPos,current,1)){ currentPos=newPos; draw(); } }
      function crossesBoundary(pos, shape, dir){ return shape.some(off=>{ const idx = pos + off; const x = idx % cols; return (dir<0 && x===cols-1) || (dir>0 && x===0); }); }
      function rotate(){ 
        if(gameOver_flag) return; 
        const rots = TETROMINOES[currentType]; 
        const nextRot = (currentRot+1) % rots.length; 
        const shape = rots[nextRot]; 
        // Try wall-kick offsets: center, left -1, right +1, left -2, right +2
        const offsets = [0, -1, 1, -2, 2];
        const baseCol = currentPos % cols;
        
        for(let offset of offsets){ 
          const newPos = currentPos + offset;
          const newCol = newPos % cols;
          let canRotate = true;
          
          // Check each block in the rotated shape
          for(let off of shape) {
            const idx = newPos + off;
            // Check bounds
            if(idx < 0 || idx >= size) { 
              canRotate = false; 
              break; 
            }
            // Calculate the column offset relative to shape origin
            const blockCol = (newCol + (off % cols));
            // Check if block would wrap or go out of bounds
            if(blockCol < 0 || blockCol >= cols) { 
              canRotate = false; 
              break; 
            }
          }
          
          if(canRotate && validPosition(newPos, shape)){ 
            currentRot = nextRot; 
            current = shape; 
            currentPos = newPos; 
            draw(); 
            return; 
          } 
        } 
      }

      function clearLines(){ for(let r=0;r<rows;r++){ let full=true; for(let c=0;c<cols;c++){ const idx = r*cols + c; if(cells[idx].dataset.locked!=='1'){ full=false; break; } } if(full){ // clear row
            for(let c=0;c<cols;c++){ const idx = r*cols + c; cells[idx].dataset.locked='0'; cells[idx].dataset.type=''; cells[idx].className='cell'; }
            // drop everything above
            for(let i=r*cols-1;i>=0;i--){ const dst = i+cols; cells[dst].dataset.locked = cells[i].dataset.locked || '0'; cells[dst].dataset.type = cells[i].dataset.type || ''; cells[dst].className = 'cell'; if(cells[dst].dataset.locked==='1') cells[dst].classList.add('filled', cells[dst].dataset.type); }
            // clear top row
            for(let c=0;c<cols;c++){ const idx=c; cells[idx].dataset.locked='0'; cells[idx].dataset.type=''; cells[idx].className='cell'; }
            score += 100; scoreEl.textContent = score;
      } }
      }

      function gameOver(){ alert('Game Over'); }

      // Viewport click detection
      function setupViewportControls(){
        document.getElementById('main-area').addEventListener('click', (e)=>{
          if(gameOver_flag) return;
          const rect = document.getElementById('playfield').getBoundingClientRect();
          const x = e.clientX - rect.left;
          const width = rect.width;
          if(x < width * 0.3) moveLeft();
          else if(x > width * 0.7) moveRight();
          else rotate();
        });
      }

      // Touch/click areas
      function bindControls(){ ['touch-left-small'].forEach(id=>document.getElementById(id).addEventListener('click', ()=>moveLeft()));
        ['touch-right-small'].forEach(id=>document.getElementById(id).addEventListener('click', ()=>moveRight()));
        ['touch-center-small'].forEach(id=>document.getElementById(id).addEventListener('click', ()=>rotate()));
        // support touchstart
        ['touch-left-small','touch-center-small','touch-right-small'].forEach(id=>{ const el=document.getElementById(id); el.addEventListener('touchstart', (e)=>{ e.preventDefault(); if(id.includes('left')) moveLeft(); else if(id.includes('right')) moveRight(); else rotate(); }); });
        setupViewportControls();
      }
      
      function restart(){
        gameOver_flag = false;
        score = 0;
        scoreEl.textContent = score;
        cells.forEach(c=>{ c.dataset.locked='0'; c.dataset.type=''; c.className='cell'; });
        spawn();
        draw();
        document.getElementById('gameOverModal').style.display = 'none';
        timer = setInterval(moveDown, 1000);
      }
      
      document.getElementById('restartBtn').addEventListener('click', restart);

      // init
      window.addEventListener('resize', ()=>{ updateCellSize(); });
      updateCellSize(); 
      createGrid(); 
      bindControls(); 
      spawn(); 
      draw(); 
      timer = setInterval(moveDown,1000);

    })();
    </script>
  </body>
</html>
